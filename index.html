<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝性别竞猜 - 多人在线版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .online-badge {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .card-body {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-boy {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-girl {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        .btn-draw {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-top: 10px;
        }

        .btn-clear {
            background: #f44336;
            color: white;
            margin-top: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        .bet-list {
            list-style: none;
        }

        .bet-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .bet-item:hover {
            background-color: #f9f9f9;
        }

        .bet-item:last-child {
            border-bottom: none;
        }

        .bet-item.new {
            background-color: #fff9c4;
        }

        .bet-name {
            font-weight: 600;
            color: #333;
        }

        .bet-detail {
            text-align: right;
        }

        .bet-gender {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .bet-gender.boy {
            background: #e3f2fd;
            color: #1976d2;
        }

        .bet-gender.girl {
            background: #fce4ec;
            color: #e91e63;
        }

        .bet-amount {
            color: #667eea;
            font-weight: bold;
        }

        .bet-time {
            color: #999;
            font-size: 0.85rem;
        }

        .btn-delete {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-left: 10px;
            transition: background-color 0.2s;
        }

        .btn-delete:hover {
            background: #cc0000;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .result-emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #333;
        }

        .winners {
            margin: 20px 0;
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
        }

        .winners h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .winner-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .winner-item:last-child {
            border-bottom: none;
        }

        .sync-status {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .sync-status.error {
            background: #ffebee;
            color: #c62828;
        }

        .rules-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .rules-list li {
            padding: 15px 20px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            border-left: 4px solid #667eea;
            position: relative;
            padding-left: 50px;
            line-height: 1.6;
            color: #333;
            font-size: 0.95rem;
        }

        .rules-list li::before {
            content: attr(data-number);
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .rules-list li strong {
            color: #667eea;
        }

        .rules-highlight {
            background: #fff3cd;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
            margin-top: 15px;
            color: #856404;
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
            }

            .bet-item {
                flex-wrap: wrap;
            }

            .bet-detail {
                width: 100%;
                text-align: left;
                margin-top: 10px;
                padding-left: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>宝宝性别竞猜</h1>
            <p>猜猜是男孩还是女孩？押注赢大奖！</p>
            <div class="online-badge" id="onlineBadge">🔄 连接中...</div>
        </div>

        <div class="card">
            <div class="card-header">📋 竞猜规则</div>
            <div class="card-body">
                <ul class="rules-list">
                    <li data-number="1">
                        <strong>自由竞猜：</strong>随心所欲地猜测宝宝性别，想投多少就投多少！
                    </li>
                    <li data-number="2">
                        <strong>猜对有奖：</strong>猜对性别的小伙伴，部分金额由功能件负责人支付，原投注金额全额退回！
                    </li>
                    <li data-number="3">
                        <strong>爱心礼物：</strong>竞猜池总额将用于购买慰问礼物，一起看望霞姐和宝宝！
                    </li>
                </ul>
                <div class="rules-highlight">
                    💝 参与竞猜，不仅有机会赢奖金，还能为霞姐送上温暖的祝福！
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">投注</div>
            <div class="card-body">
                <div id="syncStatus" class="sync-status" style="display: none;"></div>
                <div class="form-group">
                    <label for="name">你的名字</label>
                    <input type="text" id="name" placeholder="输入你的名字" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>选择性别</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button type="button" class="btn btn-boy" onclick="selectGender('男孩')">👦 男孩</button>
                        <button type="button" class="btn btn-girl" onclick="selectGender('女孩')">👧 女孩</button>
                    </div>
                    <input type="hidden" id="gender">
                </div>
                <div class="form-group">
                    <label for="amount">投注金额（元）</label>
                    <input type="number" id="amount" placeholder="输入金额" min="1">
                </div>
                <button type="button" class="btn btn-primary" onclick="submitBet()">提交投注</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">实时统计</div>
            <div class="card-body">
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalUsers">0</div>
                        <div class="stat-label">参与人数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalAmount">0</div>
                        <div class="stat-label">总金额（元）</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="boyCount">0</div>
                        <div class="stat-label">押男孩</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="girlCount">0</div>
                        <div class="stat-label">押女孩</div>
                    </div>
                </div>
                <button type="button" class="btn btn-draw" onclick="openDrawModal()">开奖</button>
                <button type="button" class="btn btn-clear" onclick="clearAllBets()">清空所有记录</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">投注记录（实时同步）</div>
            <div class="card-body">
                <ul class="bet-list" id="betList"></ul>
                <div id="emptyState" class="empty-state">
                    <div class="icon">📝</div>
                    <p>暂无投注记录，快来参与吧！</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="drawModal">
        <div class="modal-content">
            <div class="result-emoji" id="resultEmoji">🎉</div>
            <h2 class="result-title" id="resultTitle">开奖结果</h2>
            <div id="winnersList" class="winners"></div>
            <button type="button" class="btn btn-primary" onclick="closeDrawModal()">关闭</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, push, onValue, remove, set } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        // ====== Firebase 配置 ======
        // TODO: 替换为你的 Firebase 配置
        const firebaseConfig = {
            apiKey:  "AIzaSyAPnhhyuMHltKq5s4vz2-ttLfE-uQSO6dc",
            authDomain: "babybet-realtime-database.firebaseapp.com",
            databaseURL: "https://babybet-realtime-database-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "babybet-realtime-database",
            storageBucket:  "babybet-realtime-database.firebasestorage.app",
            messagingSenderId: "569987516507",
            appId: "1:569987516507:web:b2f9c472efb818356f577e"
        };

        // 初始化 Firebase
        let app, database, betsRef;
        let isFirebaseReady = false;

        try {
            app = initializeApp(firebaseConfig);
            database = getDatabase(app);
            betsRef = ref(database, 'bets');
            isFirebaseReady = true;

            // 设置实时监听
            setupRealtimeListener();
            updateOnlineStatus('✅ 在线同步');
        } catch (error) {
            console.error('Firebase 初始化失败:', error);
            updateOnlineStatus('❌ 连接失败', true);
            showSyncMessage('Firebase 配置错误，请检查配置信息', true);
        }

        // ====== 全局变量 ======
        let allBets = [];
        let lastBetId = null;

        // ====== 更新在线状态 ======
        function updateOnlineStatus(message, isError = false) {
            const badge = document.getElementById('onlineBadge');
            badge.textContent = message;
            if (isError) {
                badge.style.background = '#f44336';
            } else {
                badge.style.background = '#4caf50';
            }
        }

        function showSyncMessage(message, isError = false) {
            const el = document.getElementById('syncStatus');
            el.textContent = message;
            el.className = isError ? 'sync-status error' : 'sync-status';
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 3000);
        }

        // ====== 设置实时监听器 ======
        function setupRealtimeListener() {
            onValue(betsRef, (snapshot) => {
                allBets = [];
                snapshot.forEach((childSnapshot) => {
                    const bet = childSnapshot.val();
                    allBets.push({
                        id: childSnapshot.key,
                        ...bet
                    });
                });
                render();
            }, (error) => {
                console.error('读取数据失败:', error);
                updateOnlineStatus('❌ 同步失败', true);
            });
        }

        // ====== 选择性别 ======
        window.selectGender = function(gender) {
            document.getElementById('gender').value = gender;
            document.querySelectorAll('.btn-boy, .btn-girl').forEach(btn => {
                btn.style.opacity = '0.5';
            });
            if (gender === '男孩') {
                document.querySelector('.btn-boy').style.opacity = '1';
            } else {
                document.querySelector('.btn-girl').style.opacity = '1';
            }
        };

        // ====== 提交投注 ======
        window.submitBet = async function() {
            if (!isFirebaseReady) {
                alert('Firebase 未就绪，请检查配置！');
                return;
            }

            const name = document.getElementById('name').value.trim();
            const gender = document.getElementById('gender').value;
            const amount = parseInt(document.getElementById('amount').value);

            if (!name) {
                alert('请输入你的名字！');
                return;
            }
            if (!gender) {
                alert('请选择性别！');
                return;
            }
            if (!amount || amount <= 0) {
                alert('请输入有效的金额！');
                return;
            }

            const bet = {
                name: name,
                gender: gender,
                amount: amount,
                time: new Date().toLocaleString('zh-CN'),
                timestamp: Date.now()
            };

            try {
                await push(betsRef, bet);

                // 清空表单
                document.getElementById('name').value = '';
                document.getElementById('gender').value = '';
                document.getElementById('amount').value = '';
                document.querySelectorAll('.btn-boy, .btn-girl').forEach(btn => {
                    btn.style.opacity = '0.5';
                });

                showSyncMessage('✅ 投注成功！所有人都能看到了');
            } catch (error) {
                console.error('提交投注失败:', error);
                alert('投注失败：' + error.message);
            }
        };

        // ====== 删除投注 ======
        window.deleteBet = async function(betId) {
            if (!confirm('确定要删除这条投注记录吗？')) {
                return;
            }

            try {
                const betRef = ref(database, `bets/${betId}`);
                await remove(betRef);
                showSyncMessage('✅ 删除成功');
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败：' + error.message);
            }
        };

        // ====== 清空所有投注 ======
        window.clearAllBets = async function() {
            if (!confirm('确定要清空所有投注记录吗？此操作不可恢复！')) {
                return;
            }

            try {
                await set(betsRef, null);
                showSyncMessage('✅ 已清空所有记录');
            } catch (error) {
                console.error('清空失败:', error);
                alert('清空失败：' + error.message);
            }
        };

        // ====== 渲染页面 ======
        function render() {
            const totalUsers = allBets.length;
            const totalAmount = allBets.reduce((sum, bet) => sum + bet.amount, 0);
            const boyCount = allBets.filter(bet => bet.gender === '男孩').length;
            const girlCount = allBets.filter(bet => bet.gender === '女孩').length;

            document.getElementById('totalUsers').textContent = totalUsers;
            document.getElementById('totalAmount').textContent = totalAmount;
            document.getElementById('boyCount').textContent = boyCount;
            document.getElementById('girlCount').textContent = girlCount;

            const listEl = document.getElementById('betList');
            const emptyState = document.getElementById('emptyState');
            listEl.innerHTML = '';

            if (allBets.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';

                // 按时间戳倒序排序
                const sortedBets = [...allBets].sort((a, b) => b.timestamp - a.timestamp);

                sortedBets.forEach(bet => {
                    const li = document.createElement('li');
                    li.className = 'bet-item';

                    // 高亮最新的投注
                    if (lastBetId !== null && bet.id !== lastBetId && bet.id === sortedBets[0].id) {
                        li.classList.add('new');
                        setTimeout(() => li.classList.remove('new'), 2000);
                    }

                    li.innerHTML = `
                        <span class="bet-name">${bet.name}</span>
                        <div class="bet-detail">
                            <span class="bet-gender ${bet.gender === '男孩' ? 'boy' : 'girl'}">${bet.gender === '男孩' ? '👦' : '👧'} ${bet.gender}</span>
                            <span class="bet-amount">¥${bet.amount}</span>
                            <span class="bet-time">${bet.time}</span>
                            <button class="btn-delete" onclick="deleteBet('${bet.id}')">删除</button>
                        </div>
                    `;
                    listEl.appendChild(li);
                });

                // 更新最新投注ID
                if (sortedBets.length > 0) {
                    lastBetId = sortedBets[0].id;
                }
            }
        }

        // ====== 开奖 ======
        window.openDrawModal = function() {
            if (allBets.length === 0) {
                alert('暂无投注记录！');
                return;
            }

            const gender = prompt('请输入开奖结果（输入"男孩"或"女孩"）：');
            if (!gender) return;

            const resultGender = gender.trim();
            if (resultGender !== '男孩' && resultGender !== '女孩') {
                alert('请输入"男孩"或"女孩"！');
                return;
            }

            const winners = allBets.filter(bet => bet.gender === resultGender);
            const losers = allBets.filter(bet => bet.gender !== resultGender);

            const modal = document.getElementById('drawModal');
            const emoji = document.getElementById('resultEmoji');
            const title = document.getElementById('resultTitle');
            const winnersList = document.getElementById('winnersList');

            emoji.textContent = resultGender === '男孩' ? '👦' : '👧';
            title.textContent = `开奖结果是：${resultGender}`;

            if (winners.length === 0) {
                winnersList.innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <p style="color: #999;">😢 没有人猜对哦！</p>
                        <p style="margin-top: 10px;">押${resultGender === '男孩' ? '女孩' : '男孩'}的有 ${losers.length} 人</p>
                    </div>
                `;
            } else {
                const winAmount = winners.reduce((sum, bet) => sum + bet.amount, 0);
                let html = `
                    <h3>🏆 猜对的人数：${winners.length} 人</h3>
                    <p style="margin-bottom: 15px;">💯 猜对总金额：¥${winAmount}</p>
                    <div class="winner-list">
                `;
                winners.forEach(winner => {
                    html += `
                        <div class="winner-item">
                            <span>${winner.name}</span>
                            <span>¥${winner.amount}</span>
                        </div>
                    `;
                });
                html += '</div>';
                winnersList.innerHTML = html;
            }

            modal.classList.add('active');
        };

        window.closeDrawModal = function() {
            document.getElementById('drawModal').classList.remove('active');
        };

        document.getElementById('drawModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDrawModal();
            }
        });
    </script>
</body>
</html>
